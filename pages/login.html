<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Stackly Restaurant</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="auth-page">

  <!-- LEFT IMAGE -->
  <div class="auth-image">
    <picture>
      <source srcset="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=900&fm=webp&q=85" type="image/webp"/>
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=900&fm=webp&q=85" alt="Elegant food" loading="eager"/>
    </picture>
    <div class="auth-image-overlay"></div>
    <div class="auth-image-text">
      <h2>Welcome back<br/>to the hearth.</h2>
      <p>Your table awaits.</p>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="auth-form-side">
    <a href="../index.html" class="auth-logo">Stackly Restaurant</a>

    <!-- Form -->
    <div id="loginFormWrap">
      <h2>Sign In</h2>
      <p class="sub-text">Access your reservations and dining history.</p>

      <div class="social-auth">
        <button class="social-auth-btn" type="button" onclick="showToast('Google sign-in coming soon.')">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-auth-btn" type="button" onclick="showToast('Facebook sign-in coming soon.')">
          <svg viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <div class="divider">or continue with email</div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <div class="auth-row">
          <label><input type="checkbox"/> Keep me signed in</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center">Sign In</button>
      </form>

      <p class="auth-switch">New to Stackly Restaurant? <a href="signup.html">Create an account</a></p>
    </div>

    <!-- Success state -->
    <div id="loginSuccess" class="success-message" style="display:none">
      <div class="check">✓</div>
      <h3>Welcome Back!</h3>
      <p>You've signed in successfully. Your table awaits.</p>
      <a href="../index.html" class="btn btn-gold" style="margin-top:1.5rem">Back to Home</a>
    </div>
  </div>

</div>

<script src="../js/main.js"></script>
<script>
  // Override login form for this page
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    if (!email) return;
    document.getElementById('loginFormWrap').style.display = 'none';
    document.getElementById('loginSuccess').style.display = 'block';
  });
</script>
</body>
</html>
